<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Pedidos Cozinha v1.1</title>
    <style>
        :root { --primary: #1565C0; --bg: #f0f2f5; }
        body { font-family: Arial, sans-serif; margin: 0; background: var(--bg); user-scalable: no; }
        
        /* HEADER & LAYOUT */
        header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .version-tag { font-size: 10px; opacity: 0.8; text-align: center; padding: 5px; color: #666; }
        
        /* FILTROS (CHIPS) */
        .filters { padding: 10px; display: flex; gap: 8px; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #ddd; background: white; }
        .chip { padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; border: 2px solid transparent; background: #e0e0e0; }
        .chip.active { border-color: #333; }

        /* GRID BALCÃO */
        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 15px; }
        .btn-pedido { 
            border: none; border-radius: 12px; padding: 20px 10px; font-size: 16px; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; text-transform: uppercase;
        }

        /* CARDS COZINHA */
        .card { background: white; margin: 10px; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 10px solid #ccc; }
        .pendente { border-left-color: #d32f2f; animation: pulse 1.5s infinite; }
        .fazendo { border-left-color: #fbc02d; }
        .concluido { border-left-color: #9e9e9e; opacity: 0.4; text-decoration: line-through; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 rgba(211,47,47,0.4); } 70% { box-shadow: 0 0 15px rgba(211,47,47,1); } 100% { box-shadow: 0 0 0 rgba(211,47,47,0); } }

        /* MODAIS (ESTILO ETIQUETADORA) */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; max-height: 85vh; overflow-y: auto; }
        .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 8px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        
        .btn-action { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-cancel { background: #eee; color: #333; border: none; padding: 10px; border-radius: 6px; width: 100%; margin-top: 5px; cursor: pointer; }
        
        .item-gestao { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="setup" class="modal-overlay" style="display: flex;">
    <div class="modal">
        <div class="modal-title">Configuração de Função</div>
        <button class="btn-action" onclick="definirModo('balcao')">MODO BALCÃO (SOLICITAR)</button>
        <button class="btn-action" style="background:#2e7d32" onclick="definirModo('cozinha')">MODO COZINHA (RECEBER)</button>
    </div>
</div>

<div id="app" style="display:none;">
    <header>
        <span id="labelModo">Pedidos Cozinha</span>
        <button onclick="abrirLoginAdmin()" style="background:none; border:none; color:white; font-size:22px;">⚙️</button>
    </header>

    <div id="view-balcao" style="display:none;">
        <div class="filters" id="filtros-categorias"></div>
        <div class="grid-produtos" id="grid-pedidos"></div>
    </div>

    <div id="view-cozinha" style="display:none;">
        <div id="lista-kds"></div>
    </div>
    
    <div class="version-tag">Pedidos Cozinha v1.1</div>
</div>

<div id="modalLogin" class="modal-overlay">
    <div class="modal">
        <div class="modal-title">Acesso Restrito</div>
        <div class="form-group">
            <label>Senha do Administrador:</label>
            <input type="password" id="senhaAdmin" inputmode="numeric" pattern="[0-9]*" placeholder="****">
        </div>
        <button class="btn-action" onclick="validarAdmin()">ENTRAR</button>
        <button class="btn-cancel" onclick="fecharModal('modalLogin')">CANCELAR</button>
    </div>
</div>

<div id="modalPainel" class="modal-overlay">
    <div class="modal">
        <div class="modal-title">Painel de Gestão</div>
        <div class="form-group">
            <label>URL do Google Script:</label>
            <input type="text" id="cfgUrl" placeholder="https://script.google.com/...">
        </div>
        <hr>
        <button class="btn-action" style="background:#555" onclick="abrirGestao('categorias')">📦 GERENCIAR CATEGORIAS</button>
        <button class="btn-action" style="background:#555" onclick="abrirGestao('produtos')">🍎 GERENCIAR PRODUTOS</button>
        <button class="btn-action" onclick="salvarGeral()">SALVAR TUDO</button>
        <button class="btn-cancel" onclick="localStorage.clear(); location.reload();">REINICIAR APP (TROCAR MODO)</button>
        <button class="btn-cancel" onclick="fecharModal('modalPainel')">FECHAR</button>
    </div>
</div>

<div id="modalLista" class="modal-overlay">
    <div class="modal">
        <div class="modal-title" id="listaTitulo">Gerenciar</div>
        <button class="btn-action" id="btnNovoItem">+ NOVO</button>
        <div id="listaConteudo" style="margin-top:15px"></div>
        <button class="btn-cancel" onclick="fecharModal('modalLista'); document.getElementById('modalPainel').style.display='flex';">VOLTAR</button>
    </div>
</div>

<audio id="audioAlerta" loop src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
    let db = JSON.parse(localStorage.getItem('kds_v1_db')) || {
        url: '',
        modo: '',
        categorias: [{nome: 'Geral', cor: '#1565C0', txt: '#ffffff'}],
        produtos: []
    };
    let pedidosServidor = [];
    let catAtiva = 'TODOS';

    function salvarDB() { localStorage.setItem('kds_v1_db', JSON.stringify(db)); }

    function definirModo(m) {
        db.modo = m; salvarDB();
        location.reload();
    }

    if(db.modo) {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('labelModo').innerText = db.modo === 'balcao' ? 'BALCÃO - PEDIDOS' : 'COZINHA';
        if(db.modo === 'balcao') renderBalcao();
        else {
            document.getElementById('view-cozinha').style.display = 'block';
            setInterval(syncCozinha, 5000);
            syncCozinha();
        }
    }

    // --- ADMIN & LOGIN ---
    function abrirLoginAdmin() {
        document.getElementById('senhaAdmin').value = '';
        document.getElementById('modalLogin').style.display = 'flex';
        setTimeout(() => document.getElementById('senhaAdmin').focus(), 200);
    }

    function validarAdmin() {
        if(document.getElementById('senhaAdmin').value === '1999') {
            fecharModal('modalLogin');
            document.getElementById('cfgUrl').value = db.url;
            document.getElementById('modalPainel').style.display = 'flex';
        } else { alert("Senha incorreta!"); }
    }

    function salvarGeral() {
        db.url = document.getElementById('cfgUrl').value;
        salvarDB();
        alert("Configurações salvas!");
        location.reload();
    }

    // --- GESTÃO DE PRODUTOS E CATEGORIAS ---
    function abrirGestao(tipo) {
        fecharModal('modalPainel');
        const tit = document.getElementById('listaTitulo');
        const cont = document.getElementById('listaConteudo');
        const btn = document.getElementById('btnNovoItem');
        cont.innerHTML = '';
        
        if(tipo === 'categorias') {
            tit.innerText = "Categorias";
            btn.onclick = () => addCat();
            db.categorias.forEach((c, idx) => {
                cont.innerHTML += `<div class="item-gestao"><span>${c.nome}</span> <button onclick="deleteItem('cat', ${idx})">🗑️</button></div>`;
            });
        } else {
            tit.innerText = "Produtos";
            btn.onclick = () => addProd();
            db.produtos.forEach((p, idx) => {
                cont.innerHTML += `<div class="item-gestao"><span>${p.nome} (${p.cat})</span> <button onclick="deleteItem('prod', ${idx})">🗑️</button></div>`;
            });
        }
        document.getElementById('modalLista').style.display = 'flex';
    }

    function addCat() {
        const n = prompt("Nome da Categoria:");
        if(!n) return;
        const c = prompt("Cor de fundo (Hex):", "#1565C0");
        db.categorias.push({nome: n, cor: c, txt: '#ffffff'});
        salvarDB(); abrirGestao('categorias');
    }

    function addProd() {
        const n = prompt("Nome do Produto:");
        if(!n) return;
        let cats = db.categorias.map(c => c.nome).join(" | ");
        const c = prompt("Categoria exata ("+cats+"):");
        db.produtos.push({nome: n, cat: c});
        salvarDB(); abrirGestao('produtos');
    }

    function deleteItem(tipo, idx) {
        if(tipo === 'cat') db.categorias.splice(idx, 1);
        else db.produtos.splice(idx, 1);
        salvarDB(); abrirGestao(tipo === 'cat' ? 'categorias' : 'produtos');
    }

    // --- BALCÃO ---
    function renderBalcao() {
        document.getElementById('view-balcao').style.display = 'block';
        const f = document.getElementById('filtros-categorias');
        f.innerHTML = `<div class="chip ${catAtiva==='TODOS'?'active':''}" onclick="filtrar('TODOS')">TODOS</div>`;
        db.categorias.forEach(c => {
            f.innerHTML += `<div class="chip ${catAtiva===c.nome?'active':''}" onclick="filtrar('${c.nome}')" style="background:${c.cor}; color:${c.txt}">${c.nome}</div>`;
        });

        const g = document.getElementById('grid-pedidos');
        g.innerHTML = '';
        db.produtos.filter(p => catAtiva === 'TODOS' || p.cat === catAtiva).forEach(p => {
            const catObj = db.categorias.find(c => c.nome === p.cat) || {cor: '#eee', txt: '#000'};
            g.innerHTML += `<button class="btn-pedido" style="background:${catObj.cor}; color:${catObj.txt}" onclick="pedir('${p.nome}')">${p.nome}</button>`;
        });
    }

    function filtrar(c) { catAtiva = c; renderBalcao(); }

    async function pedir(nome) {
        if(!db.url) return alert("Configure a URL primeiro!");
        if(!confirm("Solicitar "+nome+"?")) return;
        await fetch(db.url, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action:'novo_pedido', produto: nome}) });
        alert("Enviado!");
    }

    // --- COZINHA ---
    async function syncCozinha() {
        if(!db.url) return;
        const r = await fetch(db.url);
        pedidosServidor = await r.json();
        const cont = document.getElementById('lista-kds');
        const agora = Date.now();
        
        cont.innerHTML = pedidosServidor.filter(p => {
            if(p.status !== 'concluido') return true;
            return (agora - new Date(p.finalizadoEm).getTime()) < 300000;
        }).reverse().map(p => `
            <div class="card ${p.status}">
                <div><b>${p.produto}</b><br><small>${new Date(p.timestamp).toLocaleTimeString()}</small></div>
                <div>
                    ${p.status==='pendente'? `<button class="btn-action" style="background:#d32f2f" onclick="status('${p.id}','fazendo')">ASSUMIR</button>` : ''}
                    ${p.status==='fazendo'? `<button class="btn-action" style="background:#fbc02d; color:#000" onclick="status('${p.id}','concluido')">CONCLUIR</button>` : ''}
                    ${p.status==='concluido'? `<span style="color:green; font-weight:bold;">PRONTO</span>` : ''}
                </div>
            </div>
        `).join('');

        const som = document.getElementById('audioAlerta');
        if(pedidosServidor.some(p => p.status === 'pendente')) som.play().catch(()=>{});
        else { som.pause(); som.currentTime = 0; }
    }

    async function status(id, s) {
        await fetch(db.url, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action:'atualizar_status', id: id, novoStatus: s}) });
        syncCozinha();
    }

    function fecharModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
