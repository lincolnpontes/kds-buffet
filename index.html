<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1565C0" id="metaThemeColor">
    <title>Pedidos Cozinha v1.5</title>

    <style>
        /* CSS DA ETIQUETADORA V1.7 - BASE */
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; display: flex; justify-content: center; user-select: none; }
        .app-container { width: 100%; max-width: 500px; background-color: #ffffff; min-height: 100vh; box-shadow: 0 0 10px rgba(0,0,0,0.1); position: relative; }
        
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; color: white; transition: background-color 0.3s ease; }
        .header-title { flex: 1; font-size: 18px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .header-actions button { background: none; border: none; color: white; font-size: 24px; cursor: pointer; margin-left: 10px; }
        
        .operator-bar { padding: 8px 15px; display: flex; align-items: center; gap: 10px; font-size: 14px; color: white; transition: background-color 0.3s ease; }
        .operator-bar select { flex: 1; padding: 8px; border-radius: 4px; border: none; font-weight: bold; }
        
        /* CONTROLE DE CORES (TEMAS) */
        body.theme-panelas .header { background-color: #1565C0 !important; }
        body.theme-panelas .operator-bar { background-color: #1976D2 !important; }
        
        body.theme-cozinha .header { background-color: #2e7d32 !important; }
        body.theme-cozinha .operator-bar { background-color: #388e3c !important; }

        /* FILTROS E LISTAS */
        .filters { padding: 10px 15px; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #eee; }
        .chip { background-color: #e0e0e0; color: #333; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: bold; border: 2px solid transparent; }
        .chip.active { border: 2px solid #333; opacity: 0.9; }
        .list { padding: 0; margin: 0; list-style: none; padding-bottom: 20px; }
        .item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: transform 0.2s; overflow: hidden; }
        .item:hover { background-color: #f9f9f9; }
        .item:active { background-color: #e3f2fd; }
        .item-avatar { background-color: #BBDEFB; color: #1565C0; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 15px; min-width: 40px; }
        .item-info { flex: 1; pointer-events: none; }
        .item-title { font-weight: bold; font-size: 18px; margin-bottom: 4px; }
        .item-subtitle { color: #666; font-size: 14px; }
        
        /* MODAIS */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
        .modal-title { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #333; border-bottom: 2px solid #1976D2; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .form-group input[type="color"] { height: 45px; padding: 2px; cursor: pointer; width: 100%; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #eee; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; color: #333; font-weight: bold; }
        .btn-action { background: #1976D2; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        .btn-danger { background: #d32f2f; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-outline { background: #E3F2FD; color: #1976D2; border: 1px solid #1976D2; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; display: flex; align-items: center; justify-content: flex-start; gap: 15px; }
        .btn-outline-icon { font-size: 28px; }
        .gerenciar-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .gerenciar-info { flex: 1; font-size: 14px; }
        .gerenciar-actions button { background: none; border: none; cursor: pointer; font-size: 20px; margin-left: 10px; }
        .color-preview { display: inline-block; padding: 2px 8px; border-radius: 12px; margin-right: 5px; vertical-align: middle; border: 1px solid #ccc; font-weight: bold; font-size: 12px; }

        /* ESTILOS DA COZINHA E GESTOS */
        .status-pendente { border-left: 8px solid #d32f2f; background-color: #ffebee; }
        .status-fazendo { border-left: 8px solid #fbc02d; background-color: #fffde7; }
        .status-concluido { border-left: 8px solid #9e9e9e; opacity: 0.6; text-decoration: line-through; }
        
        .swipe-hint { color: #1976D2; font-size: 24px; font-weight: bold; pointer-events: none; }
        
        .alerta-pisca { animation: bg-pisca 1s infinite; }
        @keyframes bg-pisca { 0% { background-color: #2e7d32; } 50% { background-color: #d32f2f; } 100% { background-color: #2e7d32; } }
    </style>
</head>
<body class="theme-panelas">

<div class="app-container">
    <div class="header" id="mainHeader">
        <div class="header-title" id="appTitle">Panelas</div>
        <div class="header-actions">
            <button onclick="abrirLoginAdmin()" title="Painel e Configurações">⚙️</button>
        </div>
    </div>
    
    <div class="operator-bar" id="barraOperador">
        <span>Modo atual:</span>
        <select id="seletorModo" onchange="verificarTrocaModo(this)">
            <option value="panelas">Panelas</option>
            <option value="cozinha">Cozinha</option>
        </select>
    </div>

    <div id="area-panelas">
        <div class="filters" id="containerFiltros"></div>
        <ul class="list" id="listaProdutosPanelas"></ul>
    </div>

    <div id="area-cozinha" style="display: none;">
        <ul class="list" id="listaPedidosCozinha"></ul>
    </div>
</div>

<div class="modal-overlay" id="modalLoginAdmin">
    <div class="modal">
        <div class="modal-title">Acesso Restrito</div>
        <div class="form-group">
            <label>Senha do Administrador:</label>
            <input type="password" id="senhaAdmin" placeholder="Digite a senha" inputmode="numeric" pattern="[0-9]*" oninput="checarSenhaAutomatica(this)">
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="fecharModal('modalLoginAdmin')">Cancelar</button>
            <button class="btn-action" onclick="validarSenhaManual()">Entrar</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalPainelUnificado">
    <div class="modal">
        <div style="text-align: center; color: #666; font-size: 13px; font-weight: bold; margin-bottom: 20px;">
            Pedidos Cozinha - v1.5
        </div>

        <h3 style="font-size: 16px; color: #555; margin-bottom: 10px;">Painel de Gestão</h3>
        <button class="btn-outline" onclick="abrirGerenciar('produtos')">
            <span class="btn-outline-icon">📦</span> Gerenciar Produtos
        </button>
        <button class="btn-outline" onclick="abrirGerenciar('categorias')">
            <span class="btn-outline-icon">🏷️</span> Gerenciar Categorias
        </button>

        <h3 style="font-size: 16px; color: #555; margin-top: 25px; margin-bottom: 10px;">Configurações de Sincronização</h3>
        <div class="form-group">
            <label>URL do Google Apps Script:</label>
            <input type="text" id="configUrlApp" placeholder="https://script.google.com/macros/s/...">
            <button class="btn-action" style="width: 100%; margin-top: 10px; background-color: #4CAF50;" onclick="salvarUrlGeral()">💾 Salvar URL</button>
        </div>

        <div class="modal-actions">
            <button class="btn-cancel" onclick="fecharModal('modalPainelUnificado')">Fechar Painel</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalListagem">
    <div class="modal">
        <div class="modal-title" id="tituloListagem">Gerenciar</div>
        <button class="btn-action" id="btnNovoListagem" style="width: 100%; margin-bottom: 15px;">+ Novo</button>
        <div id="conteudoListagem" style="max-height: 50vh; overflow-y: auto; padding-right: 5px;"></div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="voltarPainelUnificado()">Voltar</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalFormProduto">
    <div class="modal">
        <div class="modal-title">Produto (Panelas)</div>
        <input type="hidden" id="prodIndexOriginal">
        <div class="form-group">
            <label>Nome do Produto:</label>
            <input type="text" id="prodNome">
        </div>
        <div class="form-group">
            <label>Categoria:</label>
            <select id="prodCategoria"></select>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="fecharModal('modalFormProduto'); abrirGerenciar('produtos')">Cancelar</button>
            <button class="btn-action" onclick="salvarProduto()">Salvar</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalFormCategoria">
    <div class="modal">
        <div class="modal-title">Categoria</div>
        <input type="hidden" id="catNomeOriginal">
        <div class="form-group">
            <label>Nome da Categoria:</label>
            <input type="text" id="catNome">
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>Cor do Fundo:</label>
                <input type="color" id="catCor" value="#1976D2">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Cor do Texto:</label>
                <input type="color" id="catCorTexto" value="#ffffff">
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="fecharModal('modalFormCategoria'); abrirGerenciar('categorias')">Cancelar</button>
            <button class="btn-action" onclick="salvarCategoria()">Salvar</button>
        </div>
    </div>
</div>

<audio id="audioAlerta" loop src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
    // --- BANCO DE DADOS LOCAL ---
    let db = carregarBanco();
    let categoriaAtual = null;
    let pedidosServidor = [];
    let loopCozinha = null;
    let alarmeTocando = false;

    function carregarBanco() {
        let defaultDB = {
            produtos: [
                { nome: "Arroz Branco", categoria: "Guarnições" },
                { nome: "Feijão", categoria: "Guarnições" },
                { nome: "Carne de Sol", categoria: "Carnes" }
            ],
            categorias: [
                { nome: "Guarnições", cor: "#fff0b3", corTexto: "#000000" },
                { nome: "Carnes", cor: "#ffcccc", corTexto: "#000000" }
            ],
            configs: { 
                modo: "panelas", 
                url: ""
            }
        };
        let local = JSON.parse(localStorage.getItem('kds_v1_db'));
        
        if(local && local.configs && local.configs.modo === 'balcao') {
            local.configs.modo = 'panelas';
        }
        
        return local || defaultDB;
    }

    function salvarBancoLocal() {
        localStorage.setItem('kds_v1_db', JSON.stringify(db));
    }

    // --- INICIALIZAÇÃO E CONTROLE VISUAL ---
    function iniciar() {
        document.getElementById('seletorModo').value = db.configs.modo || 'panelas';
        aplicarModoVisual(db.configs.modo || 'panelas');
    }

    function verificarTrocaModo(selectElement) {
        db.configs.modo = selectElement.value;
        salvarBancoLocal();
        aplicarModoVisual(db.configs.modo);
    }

    function aplicarModoVisual(modo) {
        const t = document.getElementById('appTitle');
        const themeColor = document.getElementById('metaThemeColor');
        
        // A mágica das cores acontece aqui, mudando a classe do body inteiro.
        document.body.className = modo === 'panelas' ? 'theme-panelas' : 'theme-cozinha';
        
        if(modo === 'panelas') {
            if(themeColor) themeColor.content = '#1565C0';
            t.innerText = "Panelas";
            
            document.getElementById('area-panelas').style.display = 'block';
            document.getElementById('area-cozinha').style.display = 'none';
            
            if(loopCozinha) clearInterval(loopCozinha);
            pararAlarme();
            renderizarFiltros();
            renderizarListaPanelas();
        } else {
            if(themeColor) themeColor.content = '#2e7d32';
            t.innerText = "Cozinha";
            
            document.getElementById('area-panelas').style.display = 'none';
            document.getElementById('area-cozinha').style.display = 'block';
            
            syncCozinha();
            if(loopCozinha) clearInterval(loopCozinha);
            loopCozinha = setInterval(syncCozinha, 5000);
        }
    }

    // --- LÓGICA DAS PANELAS ---
    function renderizarFiltros() {
        let html = `<div class="chip ${categoriaAtual === null ? 'active' : ''}" style="${categoriaAtual === null ? 'background:#ccc; color:#000;' : ''}" onclick="filtrarCategoria(null)">TODOS</div>`;
        db.categorias.forEach(cat => { 
            const isActive = categoriaAtual === cat.nome;
            html += `<div class="chip ${isActive ? 'active' : ''}" style="background-color: ${cat.cor}; color: ${cat.corTexto};" onclick="filtrarCategoria('${cat.nome}')">${cat.nome}</div>`; 
        });
        document.getElementById('containerFiltros').innerHTML = html;
    }

    function filtrarCategoria(cat) { categoriaAtual = cat; renderizarFiltros(); renderizarListaPanelas(); }

    function renderizarListaPanelas() {
        const lista = document.getElementById('listaProdutosPanelas');
        lista.innerHTML = '';
        let filtrados = categoriaAtual === null ? db.produtos : db.produtos.filter(p => p.categoria === categoriaAtual);
        
        filtrados.forEach(p => {
            const catObj = db.categorias.find(c => c.nome === p.categoria) || {cor:'#eee', corTexto:'#000'};
            const primeiraLetra = p.nome.charAt(0).toUpperCase();
            
            lista.innerHTML += `
                <li class="item" onclick="enviarPedidoPanelas('${p.nome}')">
                    <div class="item-avatar" style="background-color: ${catObj.cor}; color: ${catObj.corTexto};">${primeiraLetra}</div>
                    <div class="item-info">
                        <div class="item-title">${p.nome}</div>
                        <div class="item-subtitle">${p.categoria}</div>
                    </div>
                    <div class="swipe-hint">➕</div>
                </li>
            `;
        });
    }

    async function enviarPedidoPanelas(nome) {
        if(!db.configs.url) return alert("URL do Google Script não configurada! Clique na ⚙️ e configure.");
        if(!confirm(`Pedir reposição de: ${nome}?`)) return;

        try {
            await fetch(db.configs.url, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: 'novo_pedido', produto: nome })
            });
            alert("Pedido enviado para a cozinha!");
        } catch(e) { alert("Erro ao enviar pedido."); }
    }

    // --- LÓGICA DA COZINHA (SWIPE E CLIQUES) ---
    async function syncCozinha() {
        if(!db.configs.url || db.configs.modo !== 'cozinha') return;
        
        try {
            const resp = await fetch(db.configs.url);
            pedidosServidor = await resp.json();
            renderizarListaCozinha();
            gerenciarAlarme();
        } catch(e) { console.log("Aguardando conexão..."); }
    }

    function renderizarListaCozinha() {
        const lista = document.getElementById('listaPedidosCozinha');
        const agora = Date.now();
        lista.innerHTML = '';
        
        pedidosServidor.filter(p => {
            if(p.status !== 'concluido') return true;
            return (agora - new Date(p.finalizadoEm).getTime()) < 300000;
        }).reverse().forEach(p => {
            
            let emoji = p.status === 'concluido' ? '✔️' : (p.status === 'fazendo' ? '🔥' : '🔔');
            let acaoTxt = p.status === 'pendente' ? 'Toque para assumir' : (p.status === 'fazendo' ? '👉 Deslize para concluir' : '👈 Deslize para desfazer');
            
            lista.innerHTML += `
                <li class="item status-${p.status}" id="ped-${p.id}" 
                    data-id="${p.id}" data-status="${p.status}"
                    ontouchstart="handleTouchStart(event)" 
                    ontouchend="handleTouchEnd(event, this)">
                    <div class="item-avatar" style="background:transparent; font-size:24px;">${emoji}</div>
                    <div class="item-info">
                        <div class="item-title">${p.produto}</div>
                        <div class="item-subtitle">${new Date(p.timestamp).toLocaleTimeString()} - ${acaoTxt}</div>
                    </div>
                </li>
            `;
        });
    }

    let touchStartX = 0;
    function handleTouchStart(e) { touchStartX = e.changedTouches[0].screenX; }

    function handleTouchEnd(e, elemento) {
        let touchEndX = e.changedTouches[0].screenX;
        let diff = touchEndX - touchStartX;
        
        const id = elemento.getAttribute('data-id');
        const statusAtual = elemento.getAttribute('data-status');

        if (Math.abs(diff) < 20) {
            // CLIQUE SIMPLES
            if(statusAtual === 'pendente') alterarStatusPedido(id, 'fazendo');
        } else if (diff > 80) {
            // SWIPE DIREITA
            if(statusAtual === 'fazendo' || statusAtual === 'pendente') alterarStatusPedido(id, 'concluido');
        } else if (diff < -80) {
            // SWIPE ESQUERDA
            if(statusAtual === 'concluido') alterarStatusPedido(id, 'fazendo');
        }
    }

    async function alterarStatusPedido(id, novoStatus) {
        const el = document.getElementById(`ped-${id}`);
        if(el) {
            el.className = `item status-${novoStatus}`;
            el.querySelector('.item-subtitle').innerText = "Atualizando...";
        }

        await fetch(db.configs.url, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: 'atualizar_status', id: id, novoStatus: novoStatus })
        });
        syncCozinha();
    }

    function gerenciarAlarme() {
        const temPendente = pedidosServidor.some(p => p.status === 'pendente');
        const h = document.getElementById('mainHeader');
        
        if (temPendente) {
            h.classList.add('alerta-pisca');
            if(!alarmeTocando) { document.getElementById('audioAlerta').play().catch(()=>{}); alarmeTocando = true; }
        } else {
            pararAlarme();
        }
    }
    
    function pararAlarme() {
        document.getElementById('mainHeader').classList.remove('alerta-pisca');
        document.getElementById('audioAlerta').pause();
        document.getElementById('audioAlerta').currentTime = 0;
        alarmeTocando = false;
    }

    // --- FUNÇÕES DE ADMINISTRAÇÃO E SENHA AUTOMÁTICA ---
    function fecharModal(id) { document.getElementById(id).style.display = 'none'; }

    function abrirLoginAdmin() {
        document.getElementById('senhaAdmin').value = '';
        document.getElementById('modalLoginAdmin').style.display = 'flex';
        setTimeout(function() { document.getElementById('senhaAdmin').focus(); }, 100);
    }

    // NOVA LÓGICA INFALÍVEL DA SENHA: Checa direto no input
    function checarSenhaAutomatica(inputField) {
        if(inputField.value === "1999") {
            inputField.blur(); // Recolhe o teclado no celular
            fecharModal('modalLoginAdmin');
            document.getElementById('configUrlApp').value = db.configs.url || '';
            document.getElementById('modalPainelUnificado').style.display = 'flex';
            inputField.value = ''; // Limpa para não atrapalhar no futuro
        }
    }

    // Mantido apenas caso o usuário erre e clique no botão manualmente
    function validarSenhaManual() {
        const inputField = document.getElementById('senhaAdmin');
        if(inputField.value === "1999") {
            checarSenhaAutomatica(inputField);
        } else {
            alert("Senha incorreta!");
            inputField.value = '';
            inputField.focus();
        }
    }

    function salvarUrlGeral() {
        const urlInput = document.getElementById('configUrlApp').value.trim();
        if(urlInput === "") return alert("A URL não pode estar vazia.");
        db.configs.url = urlInput;
        salvarBancoLocal();
        alert("✅ URL salva com sucesso!");
    }

    function voltarPainelUnificado() {
        fecharModal('modalListagem');
        document.getElementById('modalPainelUnificado').style.display = 'flex';
    }

    function abrirGerenciar(tipo) {
        fecharModal('modalPainelUnificado');
        fecharModal('modalFormProduto');
        fecharModal('modalFormCategoria');
        
        const lista = document.getElementById('conteudoListagem');
        const btnNovo = document.getElementById('btnNovoListagem');
        const titulo = document.getElementById('tituloListagem');
        lista.innerHTML = '';

        if(tipo === 'produtos') {
            titulo.innerText = "Gerenciar Produtos";
            btnNovo.onclick = () => abrirFormProduto(-1);
            db.produtos.forEach((p, idx) => {
                lista.innerHTML += `<div class="gerenciar-item"><div class="gerenciar-info"><strong>${p.nome}</strong><br><span style="color:#666">${p.categoria}</span></div><div class="gerenciar-actions"><button onclick="abrirFormProduto(${idx})">✏️</button><button onclick="excluirItem('produtos', ${idx})">🗑️</button></div></div>`;
            });
        } else if (tipo === 'categorias') {
            titulo.innerText = "Gerenciar Categorias";
            btnNovo.onclick = () => abrirFormCategoria(null);
            db.categorias.forEach((c) => {
                lista.innerHTML += `<div class="gerenciar-item"><div class="gerenciar-info"><span class="color-preview" style="background:${c.cor}; color:${c.corTexto}">${c.nome}</span></div><div class="gerenciar-actions"><button onclick="abrirFormCategoria('${c.nome}')">✏️</button><button onclick="excluirItem('categorias', '${c.nome}')">🗑️</button></div></div>`;
            });
        }
        document.getElementById('modalListagem').style.display = 'flex';
    }

    function excluirItem(tipo, id) {
        if(!confirm("Certeza que deseja excluir?")) return;
        if(tipo === 'produtos') db.produtos.splice(id, 1);
        if(tipo === 'categorias') db.categorias = db.categorias.filter(i => i.nome !== id);
        salvarBancoLocal(); iniciar(); abrirGerenciar(tipo);
    }

    function abrirFormProduto(idx) {
        fecharModal('modalListagem');
        const combo = document.getElementById('prodCategoria');
        combo.innerHTML = '';
        db.categorias.forEach(c => combo.innerHTML += `<option value="${c.nome}">${c.nome}</option>`);

        if(idx >= 0) {
            const p = db.produtos[idx];
            document.getElementById('prodIndexOriginal').value = idx;
            document.getElementById('prodNome').value = p.nome;
            document.getElementById('prodCategoria').value = p.categoria;
        } else {
            document.getElementById('prodIndexOriginal').value = '-1';
            document.getElementById('prodNome').value = '';
        }
        document.getElementById('modalFormProduto').style.display = 'flex';
    }

    function salvarProduto() {
        const idx = parseInt(document.getElementById('prodIndexOriginal').value);
        const nome = document.getElementById('prodNome').value.trim();
        const cat = document.getElementById('prodCategoria').value;

        if(!nome || !cat) return alert("Preencha tudo!");

        let obj = { nome: nome, categoria: cat };
        if(idx >= 0) { db.produtos[idx] = obj; } 
        else { db.produtos.push(obj); }
        
        salvarBancoLocal(); iniciar(); abrirGerenciar('produtos');
    }

    function abrirFormCategoria(nomeOriginal) {
        fecharModal('modalListagem');
        if(nomeOriginal) {
            const c = db.categorias.find(x => x.nome === nomeOriginal);
            document.getElementById('catNomeOriginal').value = c.nome;
            document.getElementById('catNome').value = c.nome;
            document.getElementById('catCor').value = c.cor;
            document.getElementById('catCorTexto').value = c.corTexto || '#000000';
        } else {
            document.getElementById('catNomeOriginal').value = '';
            document.getElementById('catNome').value = '';
            document.getElementById('catCor').value = '#1976D2';
            document.getElementById('catCorTexto').value = '#ffffff';
        }
        document.getElementById('modalFormCategoria').style.display = 'flex';
    }

    function salvarCategoria() {
        const nomeOrig = document.getElementById('catNomeOriginal').value;
        const nome = document.getElementById('catNome').value.trim();
        const cor = document.getElementById('catCor').value;
        const corTexto = document.getElementById('catCorTexto').value;

        if(!nome) return alert("Preencha o nome!");

        if(nomeOrig !== "") {
            const idx = db.categorias.findIndex(c => c.nome === nomeOrig);
            db.categorias[idx] = { nome, cor, corTexto };
            db.produtos.forEach(p => { if(p.categoria === nomeOrig) p.categoria = nome; });
        } else { db.categorias.push({ nome, cor, corTexto }); }
        
        salvarBancoLocal(); iniciar(); abrirGerenciar('categorias');
    }

    // DISPARO INICIAL
    iniciar();
</script>
</body>
</html>
